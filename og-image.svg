<?xml version="1.0" encoding="UTF-8"?>
<!--
  Praticulus — og:image source (1200x630, ratio 1.91:1 OG standard)
  Charte 2026-06 : light + orange. Tuile éclair + wordmark bicolore + tagline.
  Palette : bg #f4f5f8, text #1b1f2a, accent #a83a0e, brand #f2602f, muted #525a6b.
  Conversion en PNG :
    magick og-image.svg -strip -define png:compression-level=9 -colors 64 -type Palette og-image.png
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2602f"/>
      <stop offset="1" stop-color="#ff7d4d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#f4f5f8"/>

  <!-- tuile éclair -->
  <rect x="546" y="150" width="108" height="108" rx="26" fill="url(#tile)"/>
  <path d="M612 178 567 243h30l-10 40 47.5-67.5h-30L612 178z" fill="#ffffff"/>

  <!-- wordmark bicolore -->
  <text x="600" y="395" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="800" font-size="88" letter-spacing="-2">
    <tspan fill="#1b1f2a">Pratic</tspan><tspan fill="#a83a0e">ulus</tspan>
  </text>

  <!-- tagline -->
  <text x="600" y="455" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="500" font-size="31" fill="#525a6b">Find the right tool, keep your data to yourself</text>

  <!-- meta -->
  <text x="600" y="515" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="22" fill="#a83a0e" letter-spacing="3">22 TOOLS · 6 HUBS · 100% CLIENT-SIDE</text>
</svg>
